services:
  asterisk:
    build:
      context: ./asterisk
      args:
        - db_url=postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@database:5432/$POSTGRES_DB
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./asterisk/etc/asterisk:/etc/asterisk:z
      - ./asterisk/etc/odbc.ini:/etc/odbc.ini:z
      - ./asterisk/etc/odbcinst.ini:/etc/odbcinst.ini:z
    ports:
      - 5060:5060/udp
      - 5038:5038
      - 10000-10100:10000-10100/udp
    networks:
      - net
  database:
    build:
      context: ./postgres
    environment:
      - POSTGRES_USER=$POSTGRES_USER
      - POSTGRES_PASSWORD=$POSTGRES_PASSWORD
      - POSTGRES_DB=$POSTGRES_DB
      - DB_USER=$DB_USER
      - DB_PASS=$DB_PASS
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:

networks:
  net:
