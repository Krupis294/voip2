services:
  asterisk:
    build:
      context: ./asterisk
      args:
        - db_url=postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@database:5432/$POSTGRES_DB
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./asterisk/etc/asterisk:/etc/asterisk:z
      - ./asterisk/etc/odbc.ini:/etc/odbc.ini:z
      - ./asterisk/etc/odbcinst.ini:/etc/odbcinst.ini:z
    ports:
      - 5060:5060/udp
      - 5038:5038
      - 10000-10100:10000-10100/udp
    networks:
      - net
  database:
    build:
      context: ./postgres
    environment:
      - POSTGRES_USER=$POSTGRES_USER
      - POSTGRES_PASSWORD=$POSTGRES_PASSWORD
      - POSTGRES_DB=$POSTGRES_DB
      - DB_USER=$DB_USER
      - DB_PASS=$DB_PASS
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  fastapi:
      build:
        context: ./fastapi
      expose:
        - 8080
      environment:
        - ASTERISK_IP=$ASTERISK_IP
        - ASTERISK_PORT=$ASTERISK_PORT
        - AMI_USERNAME=$AMI_USERNAME
        - AMI_PASSWORD=$AMI_PASSWORD
      depends_on:
        - database
      ports:
        - 8080:8080
      networks:
        - net
      command: uvicorn voip2_backend.main:app --host 0.0.0.0 --port 8080 --reload
  nginx:
    build:
      context: ./nginx
    ports:
      - 443:443
    depends_on:
      - fastapi
    networks:
      - net

  kamailio:
    build:
      context: ./kamailio
    expose:
      - 5060/UDP
    ports:
      - 5061:5061/TCP
    depends_on:
      - asterisk
      - database
    networks:
      - net

volumes:
  postgres_data:

networks:
  net:
